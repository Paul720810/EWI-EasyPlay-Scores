<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWI EasyPlay Scores - 智能多版本互動簡譜神器</title>
    <meta name="description" content="專為 EWI 玩家設計的開源練習工具，支援 YouTube 和 Spotify 音樂自動轉換為三種難度的簡譜">
    <meta name="keywords" content="EWI, 簡譜, 音樂練習, 開源, Spotify, YouTube">

    <!-- Open Graph -->
    <meta property="og:title" content="EWI EasyPlay Scores">
    <meta property="og:description" content="智能多版本互動簡譜神器">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ewi.paul720810.dpdns.org">
    <meta name="theme-color" content="#3949EE">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>載入中...</p>
        </div>

        <div class="container">
            <header class="header">
                <h1>🎵 EWI EasyPlay Scores</h1>
                <p class="subtitle">智能多版本互動簡譜神器</p>
                <p class="description">如果自動載入延遲，這個靜態備援畫面會先顯示，避免你看到空白頁。</p>
            </header>

            <section class="card source-selection">
                <div class="source-tabs">
                    <button class="tab-btn active" type="button">YouTube 連結</button>
                    <button class="tab-btn" type="button">Spotify 搜尋</button>
                    <button class="tab-btn" type="button">本地音檔</button>
                </div>

                <div class="source-panel active">
                    <div class="input-group">
                        <label for="youtube-url-fallback">YouTube 連結</label>
                        <input id="youtube-url-fallback" type="url" placeholder="貼上 YouTube 連結..." readonly>
                        <button class="btn primary-btn" type="button">開始轉譜</button>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>🎼 簡譜顯示</h2>
                <div class="sheet-display">
                    <div class="sheet-placeholder">
                        <div class="placeholder-icon">🎼</div>
                        <h3>頁面已載入</h3>
                        <p>如果你看得到這段文字，代表站台內容已經不是空白了。</p>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>❓ 使用說明</h2>
                <div class="help-grid">
                    <div class="help-item">
                        <div class="help-icon">🎯</div>
                        <h3>轉譜</h3>
                        <p>上傳音檔或貼上 YouTube 連結開始處理。</p>
                    </div>
                    <div class="help-item">
                        <div class="help-icon">🎺</div>
                        <h3>EWI 運指</h3>
                        <p>系統會生成適合 EWI 的運指提示與難度版本。</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.0/build/Midi.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
